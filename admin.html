<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

<div class="admin-container">

<div id="login" class="card">
    <h2>Connexion</h2>
    <input type="password" id="password" placeholder="Code admin">
    <button onclick="checkPassword()">Entrer</button>
</div>

<div id="admin-panel" style="display:none;">

    <!-- CATEGORIES -->
    <div class="card">
        <h3>Catégories</h3>

        <input id="newCategory" placeholder="Nouvelle catégorie">
        <button onclick="addCategory()">Ajouter</button>

        <div id="categoryList"></div>
    </div>

    <!-- PRODUIT -->
    <div class="card">
        <h3 id="formTitle">Produit</h3>

        <input id="name" placeholder="Nom">
        <select id="categorySelect"></select>

        <input type="file" id="imageFile" accept="image/*">

        <input id="description" placeholder="Description">
        <input id="stock" type="number" placeholder="Stock">

        <button onclick="saveProduct()">Enregistrer</button>
    </div>

    <!-- LISTE -->
    <div class="card">
        <h3>Produits</h3>
        <div id="productList"></div>
    </div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
